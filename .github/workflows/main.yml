name: IPO Notifier Bot

on:
  schedule:
    - cron: '0 5 * * 1-5'  # Runs every Weekday at 5:00 AM UTC (9:30 AM IST)
  workflow_dispatch:  # Allows manual triggering

env:
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
  EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
  
jobs:
  scrape-and-email:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper and send email
      id: scraper
      run: python main.py
      continue-on-error: true

    - name: Check scraper status
      if: always()
      run: python check_scraper_status.py

    - name: Upload scraper status
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: scraper-status
        path: scraper_status.json
        retention-days: 30